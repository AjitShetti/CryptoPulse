version: "3.8"

services:
  # ── FastAPI Prediction API ───────────────────────────────────────────
  api:
    build: .
    container_name: cryptopulse-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "--fail", "--silent", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Dashboard ──────────────────────────────────────────────
  dashboard:
    build: .
    container_name: cryptopulse-dashboard
    command: streamlit run dashboard/ui.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      - API_BASE_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
